name: release

# Build static binaries for all platforms and attach them to a GitHub release on tag push.
# The ash K3s cluster's m3u-gen pod wgets the linux/amd64 asset from the latest release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Build all targets
        working-directory: src
        run: |
          mkdir -p ../dist
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64; do
            os=${target%/*}; arch=${target#*/}
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            echo "building ${os}/${arch}"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath -ldflags="-s -w" \
              -o "../dist/m3u_gen_acestream_${os}_${arch}${ext}" .
          done
          ls -la ../dist

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
